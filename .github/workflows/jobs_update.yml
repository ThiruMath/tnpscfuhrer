# ARCHIVED: Update TNPSC Jobs
# This workflow has been archived. Jobs auto-scraping is no longer active.
# Focus shifted to TNPSC Calendar, PYQ Practice, and Study Planner.

name: "[ARCHIVED] Update TNPSC Jobs"

on:
  workflow_dispatch: # Manual trigger only — cron disabled

jobs:
  scrape-and-deploy:
    if: false # Disabled
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scripts/tnpsc_jobs_scraper.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/jobs.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/jobs.json
          git commit -m "chore: auto-update TNPSC jobs data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Build Astro site
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=tnpscfuhrer

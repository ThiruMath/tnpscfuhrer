name: Regenerate Notes Daily

on:
  schedule:
    - cron: "0 2 * * *"   # Every day at 02:00 UTC
  workflow_dispatch:       # Manual trigger for testing

jobs:
  regenerate-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run note regeneration script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/process_existing_notes.mjs
        
      - name: Commit changes
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/notes/*.md notes_processing_state.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate/optimise notes (batch of 10) [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

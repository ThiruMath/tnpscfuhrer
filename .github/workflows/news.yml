# ARCHIVED: Current Affairs Pipeline
# This workflow has been archived. News auto-crawl is no longer active.
# Focus shifted to TNPSC Calendar, PYQ Practice, and Study Planner.

name: "[ARCHIVED] Current Affairs Pipeline"

on:
  workflow_dispatch: # Manual trigger only — cron disabled

jobs:
  build:
    if: false # Disabled
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - run: pip install -r requirements.txt

    - run: python scripts/crawler.py
    
    - run: python scripts/revision_generator.py

    - name: Commit changes
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add public/data/news.json public/data/revision.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update current affairs and revision set" && git push)

name: Current Affairs Pipeline

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - run: pip install -r requirements.txt

    - run: python scripts/crawler.py
    
    - run: python scripts/revision_generator.py

    - name: Commit changes
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add public/data/news.json public/data/revision.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update current affairs and revision set" && git push)

<script>

const ALL_FILES = ["Adam_Smith","Ancient_History","Constitution_of_India"]; 
/* add your full list here */

let currentNote = null;
let bookmarks = [];
let recent = [];

try { bookmarks = JSON.parse(localStorage.getItem('tnpsc_bookmarks') || '[]'); } catch(e){}
try { recent = JSON.parse(localStorage.getItem('tnpsc_recent') || '[]'); } catch(e){}

function fmt(name){
  return name.replace(/_/g,' ');
}

function renderList(){
  const list = document.getElementById('notesList');

  list.innerHTML = ALL_FILES.map(f => `
    <div class="note-item ${currentNote===f?'active':''}" onclick="openNote('${f}')">
      <span>${fmt(f)}</span>
      ${bookmarks.includes(f) ? '<span class="bm-star">⭐</span>' : ''}
    </div>
  `).join('');
}

function toggleBookmark(filename){

  bookmarks = bookmarks.includes(filename)
    ? bookmarks.filter(b => b !== filename)
    : [...bookmarks, filename];

  localStorage.setItem("tnpsc_bookmarks",JSON.stringify(bookmarks));

  renderList();
}

function renderMD(text){

  return text
  .replace(/^#### (.+)$/gm,'<h4>$1</h4>')
  .replace(/^### (.+)$/gm,'<h3>$1</h3>')
  .replace(/^## (.+)$/gm,'<h2>$1</h2>')
  .replace(/^# (.+)$/gm,'<h1>$1</h1>')
  .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
  .replace(/\*(.+?)\*/g,'<em>$1</em>')
  .replace(/`([^`]+)`/g,'<code>$1</code>')
  .replace(/\n\n+/g,'</p><p>');
}

async function openNote(filename){

  currentNote = filename;

  const detail = document.getElementById('noteDetail');

  const isBm = bookmarks.includes(filename);

  detail.innerHTML = `
    <div class="detail-header">
      <div>
        <h2>${fmt(filename)}</h2>
        <div class="fname">${filename}.md</div>
      </div>
      <button id="bmBtn" class="btn-bm ${isBm?'saved':''}"
      onclick="toggleBookmark('${filename}')">
        ${isBm?'⭐ Saved':'☆ Save'}
      </button>
    </div>

    <div class="detail-body">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p>Loading study notes...</p>
      </div>
    </div>
  `;

  try{

    const res = await fetch(`/notes/${filename}.md`);

    if(!res.ok) throw new Error("file not found");

    const text = await res.text();

    detail.querySelector('.detail-body').innerHTML =
      `<p>${renderMD(text)}</p>`;

  }catch(err){

    detail.querySelector('.detail-body').innerHTML =
      `<p style="color:var(--muted)">Note not found.</p>`;

  }

  renderList();
}

renderList();

</script>
